name: Gemini Hook Test

on:
  pull_request:

jobs:
  gemini-hook:
    name: Run Gemini hook test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m venv env
          env/bin/python -m pip install --upgrade pip
          env/bin/python -m pip install .
      - name: Run test
        shell: bash
        run: |
          set +e
          source tests/hooks/gemini.sh
